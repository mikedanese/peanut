name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test
        run: cargo test --workspace

      - name: Docs
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Check man pages are up-to-date
        run: |
          sudo apt-get install -y scdoc mandoc
          doc/generate.sh
          git diff --exit-code doc/pnut.1 doc/pnut.toml.5
          mandoc -W error doc/pnut.1
          mandoc -W error doc/pnut.toml.5
